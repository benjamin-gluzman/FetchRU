<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header id="header">
            <div id="titleRow">
                <img id="logo" src="../assets/logo.svg" alt="FetchRU Logo">
                <h1>FetchRU</h1>
            </div>

            <p>Monitor Rutgers course openings</p>
        </header>

        <section class="card">
            <div class="cardHeader">
                <h2>
                    <span id="statusDot"></span>
                    Watching
                </h2>
                <span id="watchCount">0</span>
            </div>

            <ul id="watchesList"></ul>

            <div id="emptyState">
                <p>No courses are being watched.</p>
                <span>Add a 5-digit course index below.</span>
            </div>
        </section>

        <section class="card">
            <div class="cardHeader">
                <h2>Add Watch</h2>
            </div>

            <input
                id="courseIndex"
                type="text"
                maxlength="5"
                placeholder="Course Index"
            >
            <div id="error"></div>

            <button id="addWatchBtn">Add Watch</button>
        </section>
    </div>
</body>
</html>
