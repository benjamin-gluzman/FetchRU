<!DOCTYPE html>
<html lang="en">
<head>
</head>
<body>
    <div id="app">
        <header id="header">
            <div id="titleRow">
                <img id="logo" src="../assets/logo.svg" alt="FetchRU Logo">
                <h1>FetchRU</h1>
            </div>

            <p>Monitor Rutgers course openings</p>
        </header>

        <section class="card">
            <div class="cardHeader">
                <h2>Watching</h2>
                <span id="watchCount">0</span>
            </div>

            <ul id="watchesList"></ul>
        </section>

        <section class="card">
            <h2>Add Watch</h2>

            <input
                id="courseIndex"
                type="text"
                maxlength="5"
                placeholder="Course Index"
            >
            <div id="error"></div>

            <button id="addWatchBtn">Add Watch</button>
        </section>
    </div>
</body>
</html>
